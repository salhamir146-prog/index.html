<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXOVPN Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #3b82f6; /* این رنگ به صورت داینامیک از ادمین آپدیت می‌شود */
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 16px;
            padding-bottom: 100px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            background: var(--card-bg);
            padding: 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .brand-name {
            font-size: 20px;
            font-weight: bold;
            color: var(--accent-color);
            transition: color 0.3s;
        }

        .user-welcome {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .wallet-card {
            background: linear-gradient(135deg, var(--accent-color), #8b5cf6);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: background 0.3s;
        }

        .wallet-balance {
            font-size: 24px;
            font-weight: 800;
            margin-top: 4px;
        }

        .charge-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .tabs {
            display: flex;
            background: var(--card-bg);
            padding: 6px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
        }

        .tab-btn.active {
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .plan-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 12px;
            cursor: pointer;
        }

        .plan-details h4 {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .plan-meta {
            font-size: 12px;
            color: var(--text-muted);
        }

        .plan-price {
            font-size: 16px;
            font-weight: 700;
            color: var(--success);
        }

        .buy-action-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 6px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-around;
            padding: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            font-size: 11px;
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--accent-color);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand-info">
            <span class="brand-name" id="shop-title">NEXOVPN SHOP</span>
            <span class="user-welcome" id="user-welcome">در حال اتصال به سرور...</span>
        </div>
        <div style="font-size: 24px;">⚡</div>
    </div>

    <div class="wallet-card" id="wallet-bg">
        <div class="wallet-info">
            <h3>💰 موجودی واقعی کیف پول</h3>
            <div class="wallet-balance" id="wallet-balance">۰ تومان</div>
        </div>
        <button class="charge-btn" onclick="chargeWallet()">➕ شارژ</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('user-plans', this)">🛍️ اشتراک معمولی</button>
        <button class="tab-btn" onclick="switchTab('wholesale-plans', this)">📦 فروش عمده</button>
    </div>

    <!-- بخش داینامیک لود پلن‌های معمولی -->
    <div id="user-plans" class="tab-content active">
        <div id="regular-list">در حال دریافت پلن‌های واقعی...</div>
    </div>

    <!-- بخش داینامیک لود پلن‌های عمده -->
    <div id="wholesale-plans" class="tab-content">
        <div id="wholesale-list">در حال دریافت پکیج‌های عمده...</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()">
            <span style="font-size:20px;">🏪</span><span>فروشگاه</span>
        </div>
        <div class="nav-item" onclick="openSupport()">
            <span style="font-size:20px;">☎️</span><span>پشتیبانی</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // استخراج پارامترهای آدرس به صورت کاملاً خودکار
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user_id') || 0;
        const backendUrl = urlParams.get('backend') || 'https://your-render-app.onrender.com';

        // واکشی اطلاعات تنظیمات، رنگ و کیف پول کاربر از دیتابیس ادمین ربات
        fetch(`${backendUrl}/api/shop_config?user_id=${userId}`)
            .then(res => res.json())
            .then(config => {
                document.getElementById('shop-title').innerText = config.shop_name;
                document.getElementById('wallet-balance').innerText = `${config.balance.toLocaleString('fa-IR')} تومان`;
                document.getElementById('user-welcome').innerText = `خوش آمدید، ${tg.initDataUnsafe?.user?.first_name || 'کاربر گرامی'}`;
                
                // اعمال رنگ انتخابی ادمین به صورت زنده روی مینی‌اپ!
                document.documentElement.style.setProperty('--accent-color', config.theme_color);
            }).catch(err => {
                document.getElementById('user-welcome').innerText = "اتصال آفلاین (جهت سینک، از ربات وارد شوید)";
            });

        // دریافت و رندر کردن پلن‌های تعریف شده توسط ادمین به صورت ۱۰۰٪ واقعی
        fetch(`${backendUrl}/api/get_plans`)
            .then(res => res.json())
            .then(plans => {
                const regularList = document.getElementById('regular-list');
                const wholesaleList = document.getElementById('wholesale-list');
                
                regularList.innerHTML = '';
                wholesaleList.innerHTML = '';

                let regCount = 0;
                let wholCount = 0;

                plans.forEach(plan => {
                    const cardHtml = `
                        <div class="plan-card" onclick="buyPlan('${plan.name}', ${plan.price}, ${plan.id})">
                            <div class="plan-details">
                                <h4>🚀 ${plan.name}</h4>
                                <div class="plan-meta"><span>💾 حجم: ${plan.volume} گیگ</span> | <span>⏱️ مدت: ${plan.days} روز</span></div>
                            </div>
                            <div style="text-align: left;">
                                <span class="plan-price">${plan.price.toLocaleString('fa-IR')} ت</span><br>
                                <button class="buy-action-btn">خرید آنی</button>
                            </div>
                        </div>
                    `;
                    if (plan.is_wholesale === 0) {
                        regularList.innerHTML += cardHtml;
                        regCount++;
                    } else {
                        wholesaleList.innerHTML += cardHtml;
                        wholCount++;
                    }
                });

                if(regCount === 0) regularList.innerHTML = 'هیچ پلن معمولی در دیتابیس یافت نشد.';
                if(wholCount === 0) wholesaleList.innerHTML = 'هیچ پلن عمده‌ای در دیتابیس یافت نشد.';
            });

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        function buyPlan(planName, price, planId) {
            tg.showPopup({
                title: '🛒 تایید فاکتور خرید واقعی',
                message: `آیا از خرید "${planName}" به مبلغ ${price.toLocaleString('fa-IR')} تومان از حساب کیف پول خود اطمینان دارید؟`,
                buttons: [
                    {id: 'buy', type: 'default', text: 'بله، تایید و کسر موجودی'},
                    {id: 'cancel', type: 'cancel', text: 'انصراف'}
                ]
            }, function(buttonId) {
                if (buttonId === 'buy') {
                    // ارسال اطلاعات خرید به ربات اصلی تلگرام
                    tg.sendData(JSON.stringify({action: 'buy_plan', plan_id: planId}));
                    tg.close();
                }
            });
        }

        function chargeWallet() {
            tg.showAlert('💰 برای افزایش موجودی، لطفا مینی‌اپ را ببندید و در منوی دکمه‌ای ربات گزینه "📋 اکانت من" را انتخاب کنید.');
        }

        function openSupport() {
            tg.showAlert('☎️ برای ارتباط با پشتیبانی، مینی‌اپ را ببندید و دکمه "ارتباط با پشتیبانی" را لمس کنید.');
        }
    </script>
</body>
</html>
